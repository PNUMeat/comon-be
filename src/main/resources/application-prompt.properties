- 기대 효과:\n\n\
개선점이 없으면 다음 문장을 그대로 출력:\n\n\
현재 풀이가 해당 문제 유형에 대해 매우 효율적이며, 모범 답안 수준입니다.\n\n\
구분선: ---\n\n\
6. 학습 포인트\n\n\
- 배운 알고리즘/패턴\n\n\
- 기억해야 할 테크닉\n\n\
